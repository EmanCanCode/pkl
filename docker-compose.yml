services:
  pkl-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pkl-site
    ports:
      - "8888:80"
    env_file:
      - .env
    environment:
      GMAIL: ${GMAIL}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
    restart: unless-stopped
    depends_on:
      - pkl-api

  pkl-mongo:
    image: mongo:7
    container_name: pkl-mongo
    ports:
      - "47293:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-pklroot}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-pklclub}
    volumes:
      - pkl_mongo_data:/data/db
    restart: unless-stopped

  pkl-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pkl-api
    ports:
      - "3333:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://${MONGO_USER:-pklroot}:${MONGO_PASSWORD}@pkl-mongo:27017/${MONGO_DB:-pklclub}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GMAIL: ${GMAIL}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8888}
    depends_on:
      - pkl-mongo
    restart: unless-stopped

volumes:
  pkl_mongo_data:
